name: Deploy Changed Streamlit Apps

on:
  push:
    branches: [main]

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << EOF
          [connections.default]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          database = "${{ secrets.SNOWFLAKE_DATABASE }}"
          schema = "${{ secrets.SNOWFLAKE_SCHEMA }}"
          EOF
          chmod 600 ~/.snowflake/config.toml

      - name: Detect and deploy changed apps
        run: |
          # Get list of changed files between last 2 commits
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED_FILES"

          DEPLOYED=0

          for app_dir in app/*/; do
            APP_NAME=$(basename "$app_dir")

            # Check if any file in this app folder changed
            if echo "$CHANGED_FILES" | grep -q "^app/$APP_NAME/"; then
              echo "✅ Changes detected in $APP_NAME — deploying..."

              (
                cd "$app_dir"

                snow streamlit deploy \
                  --replace \
                  --connection default
              )

              DEPLOYED=$((DEPLOYED + 1))
            else
              echo "⏭️  No changes in $APP_NAME — skipping"
            fi
          done

          echo "Total apps deployed: $DEPLOYED"
