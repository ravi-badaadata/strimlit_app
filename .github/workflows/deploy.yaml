name: Deploy Streamlit to Snowflake

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Install Snowflake CLI
    - name: Install Snowflake CLI
      run: pip install snowflake-cli-labs

    # 3. Configure Snowflake connection (FIXED - NO DUPLICATE)
    - name: Configure Snowflake connection
      env:
        SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      run: |
        snow connection add \
          --connection-name my_conn \
          --account "${{ secrets.SNOWFLAKE_ACCOUNT }}" \
          --user "${{ secrets.SNOWFLAKE_USER }}" \
          --password "$SNOWFLAKE_PASSWORD" \
          --role "${{ secrets.SNOWFLAKE_ROLE }}" \
          --warehouse "${{ secrets.SNOWFLAKE_WAREHOUSE }}" \
          --database "${{ secrets.SNOWFLAKE_DATABASE }}" \
          --schema "${{ secrets.SNOWFLAKE_SCHEMA }}"

    # 4. Upload app folder to Snowflake stage
    - name: Deploy app to Snowflake stage
      run: |
        snow stage copy app @streamlit_stage \
          --overwrite \
          --connection my_conn

    # 5. Upload requirements file
    - name: Upload requirements.txt
      run: |
        snow stage copy requirements.txt @streamlit_stage \
          --overwrite \
          --connection my_conn
