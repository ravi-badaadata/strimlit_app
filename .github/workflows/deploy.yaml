- name: Deploy to Snowflake
  env:
    SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
    SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
    SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
    SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
    SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
    SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
    SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
  run: |
    python <<EOF
    import snowflake.connector
    import os

    print("📂 Current working dir:", os.getcwd())
    print("📂 Files in root:", os.listdir())

    conn = snowflake.connector.connect(
        account=os.environ['SNOWFLAKE_ACCOUNT'],
        user=os.environ['SNOWFLAKE_USER'],
        password=os.environ['SNOWFLAKE_PASSWORD'],
        role=os.environ['SNOWFLAKE_ROLE'],
        warehouse=os.environ['SNOWFLAKE_WAREHOUSE'],
        database=os.environ['SNOWFLAKE_DATABASE'],
        schema=os.environ['SNOWFLAKE_SCHEMA']
    )

    cursor = conn.cursor()

    # Absolute paths (IMPORTANT)
    base = os.getcwd()
    app_dir = os.path.join(base, "app")

    print("📂 App dir:", app_dir)
    print("📂 App files:", os.listdir(app_dir))

    # Upload all files inside app folder
    for file in os.listdir(app_dir):
        full_path = os.path.join(app_dir, file)
        print("Uploading:", full_path)
        cursor.execute(f"PUT file://{full_path} @streamlit_stage/app AUTO_COMPRESS=FALSE OVERWRITE=TRUE")

    # Upload requirements
    req_path = os.path.join(base, "requirements.txt")
    print("Uploading:", req_path)
    cursor.execute(f"PUT file://{req_path} @streamlit_stage AUTO_COMPRESS=FALSE OVERWRITE=TRUE")

    print("✅ Upload complete")

    cursor.close()
    conn.close()
    EOF
