name: Deploy Streamlit to Snowflake

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Install SnowSQL (stable)
    - name: Install SnowSQL
      run: |
        curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.32-linux_x86_64.bash
        bash snowsql-1.2.32-linux_x86_64.bash
        echo "$HOME/.snowsql/bin" >> $GITHUB_PATH

    # 3. Upload files to Snowflake stage
    - name: Deploy to Snowflake
      env:
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
      run: |
        snowsql -a $SNOWFLAKE_ACCOUNT \
                -u $SNOWFLAKE_USER \
                -p $SNOWFLAKE_PASSWORD \
                -r $SNOWFLAKE_ROLE \
                -w $SNOWFLAKE_WAREHOUSE \
                -d $SNOWFLAKE_DATABASE \
                -s $SNOWFLAKE_SCHEMA <<EOF

        PUT file://app @streamlit_stage AUTO_COMPRESS=FALSE OVERWRITE=TRUE;
        PUT file://requirements.txt @streamlit_stage AUTO_COMPRESS=FALSE OVERWRITE=TRUE;

        EOF
