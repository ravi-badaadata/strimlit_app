name: Deploy Streamlit to Snowflake

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install snowflake-connector-python

      - name: Deploy to Snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python <<EOF
          import snowflake.connector
          import os

          print("📂 Current dir:", os.getcwd())
          print("📂 Root files:", os.listdir())

          if not os.path.exists("app"):
              raise Exception("❌ app folder missing")

          conn = snowflake.connector.connect(
              account=os.environ['SNOWFLAKE_ACCOUNT'],
              user=os.environ['SNOWFLAKE_USER'],
              password=os.environ['SNOWFLAKE_PASSWORD'],
              role=os.environ['SNOWFLAKE_ROLE'],
              warehouse=os.environ['SNOWFLAKE_WAREHOUSE'],
              database=os.environ['SNOWFLAKE_DATABASE'],
              schema=os.environ['SNOWFLAKE_SCHEMA']
          )

          cursor = conn.cursor()

          print("🔍 Checking stage...")
          cursor.execute("LIST @streamlit_stage")
          print("✅ Stage accessible")

          # ✅ Upload app files WITH folder structure
          for root, dirs, files in os.walk("app"):
              for file in files:
                  full_path = os.path.abspath(os.path.join(root, file))

                  # preserve folder structure
                  relative_path = os.path.relpath(full_path, "app")
                  stage_dir = os.path.dirname(relative_path)

                 if stage_dir == "":
                     stage_path = "@streamlit_stage/app"
                 else:
                     stage_path = f"@streamlit_stage/app/{stage_dir}"

                  print("⬆ Upload:", full_path, "→", stage_path)

                  cursor.execute(
                      f"PUT file://{full_path} {stage_path} AUTO_COMPRESS=FALSE OVERWRITE=TRUE"
                  )

          # ✅ Upload requirements ONLY if exists
          if os.path.exists("requirements.txt"):
              req_path = os.path.abspath("requirements.txt")
              print("⬆ Upload:", req_path)
              cursor.execute(
                  f"PUT file://{req_path} @streamlit_stage AUTO_COMPRESS=FALSE OVERWRITE=TRUE"
              )
          else:
              print("⚠ requirements.txt not found, skipping...")

          print("✅ Upload completed")

          cursor.close()
          conn.close()
          EOF
